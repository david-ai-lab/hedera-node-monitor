<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedera Node Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a1a; color: #ffffff; padding: 20px; }
        h1 { color: #00b388; text-align: center; margin-bottom: 30px; font-size: 2em; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #00b388; }
        .card h3 { color: #00b388; margin-bottom: 10px; }
        .card .value { font-size: 2em; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 12px; overflow: hidden; }
        th { background: #00b388; color: #0a0a1a; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #2a2a4e; }
        tr:hover { background: #2a2a4e; }
    </style>
</head>
<body>
    <h1>🌐 Hedera Node Monitor</h1>
    <p id="last-update" style="text-align:center; color:#00b388; margin-bottom:20px; font-size:0.9em;"></p>

    <div class="cards">
        <div class="card">
            <h3>Active Nodes</h3>
            <div class="value" id="total-nodes">Loading...</div>
        </div>
        <div class="card">
            <h3>Total HBAR Supply</h3>
            <div class="value" id="total-supply">Loading...</div>
        </div>
        <div class="card">
            <h3>Released Supply</h3>
            <div class="value" id="released-supply">Loading...</div>
        </div>
    </div>

    <div id="map" style="height: 400px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #00b388;"></div>

    <table>
        <thead>
            <tr>
                <th>Node ID</th>
                <th>Description</th>
                <th>Stake</th>
                <th>Status</th>
            </tr>
        </th
