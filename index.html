<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedera Node Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #0a0a1a; 
            color: #ffffff; 
            padding: 20px;
        }
        h1 { 
            color: #00b388; 
            text-align: center; 
            margin-bottom: 30px;
            font-size: 2em;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #00b388;
        }
        .card h3 { color: #00b388; margin-bottom: 10px; }
        .card .value { font-size: 2em; font-weight: bold; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
        }
        th {
            background: #00b388;
            color: #0a0a1a;
            padding: 12px;
            text-align: left;
        }
        td { padding: 12px; border-bottom: 1px solid #2a2a4e; }
        tr:hover { background: #2a2a4e; }
    </style>
</head>
<body>
    <h1>🌐 Hedera Node Monitor</h1>

    <div class="cards">
        <div class="card">
            <h3>Active Nodes</h3>
            <div class="value" id="total-nodes">Loading...</div>
        </div>
        <div class="card">
            <h3>Total HBAR Supply</h3>
            <div class="value" id="total-supply">Loading...</div>
        </div>
        <div class="card">
            <h3>Released Supply</h3>
            <div class="value" id="released-supply">Loading...</div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Node ID</th>
                <th>Description</th>
                <th>Stake</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="nodes-table">
            <tr><td colspan="4">Loading nodes...</td></tr>
        </tbody>
    </table>

    <script>
        const API = 'https://mainnet-public.mirrornode.hedera.com/api/v1';

        async function loadSupply() {
            const res = await fetch(`${API}/network/supply`);
            const data = await res.json();
            document.getElementById('total-supply').textContent = 
                (data.total_supply / 1e8).toLocaleString() + ' ℏ';
            document.getElementById('released-supply').textContent = 
                (data.released_supply / 1e8).toLocaleString() + ' ℏ';
        }

        async function loadNodes() {
            const res = await fetch(`${API}/network/nodes?limit=25`);
            const data = await res.json();
            
            document.getElementById('total-nodes').textContent = data.nodes.length;
            
            const tbody = document.getElementById('nodes-table');
            tbody.innerHTML = data.nodes.map(node => `
                <tr>
                    <td>${node.node_id}</td>
                    <td>${node.description || 'N/A'}</td>
                    <td>${(node.stake / 1e8).toLocaleString()} ℏ</td>
                    <td>✅ Active</td>
                </tr>
            `).join('');
        }

        loadSupply();
        loadNodes();
    </script>
</body>
</html>
