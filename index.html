<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedera Node Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a1a; color: #ffffff; padding: 20px; }
        h1 { color: #00b388; text-align: center; margin-bottom: 10px; font-size: 2em; }
        #last-update { text-align:center; color:#00b388; margin-bottom:20px; font-size:0.9em; }
        
        /* Cards */
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #00b388; }
        .card h3 { color: #00b388; margin-bottom: 10px; font-size: 0.9em; text-transform: uppercase; }
        .card .value { font-size: 1.8em; font-weight: bold; }

        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 0; }
        .tab-btn {
            padding: 10px 24px;
            background: #1a1a2e;
            border: 1px solid #00b388;
            border-bottom: none;
            color: #00b388;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-size: 0.95em;
        }
        .tab-btn.active { background: #00b388; color: #0a0a1a; font-weight: bold; }
        
        /* Tab content */
        .tab-content { display: none; background: #1a1a2e; border: 1px solid #00b388; border-radius: 0 8px 8px 8px; padding: 20px; }
        .tab-content.active { display: block; }

        /* Map */
        #map { height: 450px; border-radius: 8px; }

        /* Table */
        .table-wrapper { max-height: 450px; overflow-y: auto; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #00b388; color: #0a0a1a; padding: 10px 12px; text-align: left; font-size: 0.85em; position: sticky; top: 0; }
        td { padding: 10px 12px; border-bottom: 1px solid #2a2a4e; font-size: 0.85em; }
        tr:hover { background: #2a2a4e; }
    </style>
</head>
<body>
    <h1>🌐 Hedera Node Monitor</h1>
    <p id="last-update"></p>

    <div class="cards">
        <div class="card">
            <h3>Active Nodes</h3>
            <div class="value" id="total-nodes">Loading...</div>
        </div>
        <div class="card">
            <h3>Total HBAR Supply</h3>
            <div class="value" id="total-supply">Loading...</div>
        </div>
        <div class="card">
            <h3>Released Supply</h3>
            <div class="value" id="released-supply">Loading...</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('map')">🗺️ Map</button>
        <button class="tab-btn" onclick="switchTab('nodes')">📋 Nodes</button>
    </div>

    <div id="tab-map" class="tab-content active">
        <div id="map"></div>
    </div>

    <div id="tab-nodes" class="tab-content">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Node ID</th>
                        <th>Description</th>
                        <th>Stake</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="nodes-table">
                    <tr><td colspan="4">Loading nodes...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API = 'https://mainnet-public.mirrornode.hedera.com/api/v1';

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'map') map.invalidateSize();
        }

        // Supply
        async function loadSupply() {
            const res = await fetch(`${API}/network/supply`);
            const data = await res.json();
            const total = data.total_supply / 1e8;
            const released = data.released_supply / 1e8;
            const pct = ((released / total) * 100).toFixed(1);
            document.getElementById('total-supply').textContent = total.toLocaleString() + ' ℏ';
            document.getElementById('released-supply').textContent = `${released.toLocaleString()} ℏ (${pct}%)`;
        }

        // Nodes
        async function loadNodes() {
            const res = await fetch(`${API}/network/nodes?limit=25`);
            const data = await res.json();
            document.getElementById('total-nodes').textContent = data.nodes.length;
            const tbody = document.getElementById('nodes-table');
            tbody.innerHTML = data.nodes.map(node => `
                <tr>
                    <td>${node.node_id}</td>
                    <td>${node.description || 'N/A'}</td>
                    <td>${(node.stake / 1e8).toLocaleString()} ℏ</td>
                    <td>✅ Active</td>
                </tr>
            `).join('');
            addNodeMarkers(data.nodes);
        }

        // Map
        const nodeCoordinates = {
            'LG': [1.3521, 103.8198],
            'Swirlds': [41.8781, -93.0977],
            'Nomura': [35.6762, 139.6503],
            'Google': [60.1699, 24.9384],
            'Zain': [29.3759, 47.9774],
            'Magalu': [-23.5505, -46.6333],
            'DLA Piper': [60.1699, 24.9384],
            'Tata': [50.1109, 8.6821],
            'IBM': [30.2672, -97.7431],
            'Deutsche Telekom': [52.5200, 13.4050],
            'Dentons': [50.6942, 3.1746],
            'Australian Payments': [-33.8688, 151.2093],
            'EDF': [48.8566, 2.3522],
            'Shinhan': [51.5074, -0.1278],
            'FedEx': [35.1495, -90.0490],
            'Boeing': [47.6062, -122.3321],
            'Ubisoft': [48.8566, 2.3522],
            'ServiceNow': [37.3861, -122.0839],
            'Avery Dennison': [33.7490, -84.3880]
        };

        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        function addNodeMarkers(nodes) {
            nodes.forEach(node => {
                const desc = node.description || '';
                const company = Object.keys(nodeCoordinates).find(key => desc.includes(key));
                if (company) {
                    L.circleMarker(nodeCoordinates[company], {
                        radius: 8,
                        fillColor: '#00b388',
                        color: '#ffffff',
                        weight: 2,
                        fillOpacity: 0.9
                    })
                    .addTo(map)
                    .bindPopup(`<b>${desc}</b><br>Node ID: ${node.node_id}<br>Stake: ${(node.stake / 1e8).toLocaleString()} ℏ`);
                }
            });
        }

        // Countdown
        let countdown = 30;
        function updateCountdown() {
            document.getElementById('last-update').textContent =
                `Last update: ${new Date().toLocaleTimeString('en-GB')} — Refreshing in ${countdown}s`;
            countdown--;
            if (countdown < 0) {
                countdown = 30;
                loadSupply();
                loadNodes();
            }
        }

        loadSupply();
        loadNodes();
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
